source:
  local_path: ./repo
  prompt_file: ./prompts/api.md
agent:
  image: dwoe-agent:go
  model: claude-sonnet-4-6
  max_turns: 10
  env_vars:
    CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
git:
  user_name: "Agent API"
  user_email: "agent-api@dwoe.dev"
resources:
  cpu: "2"
  memory: "4G"
